version: "3"
services:
  web:
    container_name: awesome_events_web
    build: .
    environment:
      - RAILS_ENV=development
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/sample_app
    ports:
      - "3000:3000"
    tty: true
    stdin_open: true
